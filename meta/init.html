<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/zz/static/libspace.js"></script>
    <title>Init potato-app-react-lua-template</title>
</head>
<body>
    <h1>Init potato-app-react-lua-template</h1>
    <button id="runSchemaSqlButton" style="display: block;" onclick="runSchemaSql()">Run Schema SQL</button>
    <button id="goHomeButton" style="display: none;" onclick="goHome()">Go Home</button>

</body>

<script>
    if (!window.spaceGetToken('potato-app-react-lua-template')) {
        window.spaceRedirrectToAuth('/zz/space/potato-app-react-lua-template', 'init.html');
    }

    function goHome() {
        window.location.href = '/zz/space/potato-app-react-lua-template';
    }

    function runSchemaSql() {
        fetch('/zz/api/space/potato-app-react-lua-template/setup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': window.spaceGetToken('potato-app-react-lua-template'),
            },
        }).then(data => {
            document.getElementById('runSchemaSqlButton').style.display = 'none';
            document.getElementById('goHomeButton').style.display = 'block';
        });
    }


</script>
</html>
